<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sara & Artur 💗</title>


<style>
    body {
        margin: 0;
        font-family: "Georgia", serif;
        background: linear-gradient(135deg, #ffd6ec, #cde7ff);
        color: #444;
    }


    /* 🌸 CAPA COM IMAGENS */
    .hero {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        padding: 40px;
        flex-wrap: wrap;
        background: rgba(255,255,255,0.4);
    }


    .hero img {
        width: 260px;
        border-radius: 25px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        transition: 0.4s;
    }


    .hero img:hover {
        transform: scale(1.05);
    }


    header {
        text-align: center;
        padding: 20px;
    }


    header h1 {
        font-size: 38px;
        color: #ff8ec7;
    }


    nav a {
        text-decoration: none;
        margin: 0 10px;
        color: #6aa9ff;
        font-weight: bold;
    }


    .container {
        padding: 30px;
        text-align: center;
    }


    .card {
        background: white;
        padding: 25px;
        border-radius: 25px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        max-width: 700px;
        margin: auto;
    }


    .card h2 {
        color: #ff8ec7;
    }


    footer {
        text-align: center;
        padding: 20px;
        margin-top: 40px;
        background-color: rgba(255,255,255,0.5);
    }
</style>
</head>


<body>


<!-- 💗 FOTOS LOGO AO ABRIR -->
<div class="hero">
    <img src="1.jpg" alt="">
    <img src="2.jpg" alt="">
</div>


<header>
    <h1>Sara & Artur 💗🩵</h1>
    <nav>
        <a href="#">Início</a>
        <a href="#">Sobre</a>
        <a href="#">Fotos</a>
    </nav>
</header>


<div class="container">
    <div class="card">
        <h2>Sobre eles ✨</h2>
        <p>
            Sara e Artur têm uma conexão leve e especial, cheia de momentos divertidos e espontâneos. 
            Entre risadas e fotos, fica claro que juntos tudo se torna mais bonito 💗
        </p>
    </div>
</div>


<footer>
    <p>feito com 💗</p>
</footer>


</body>
</html>
